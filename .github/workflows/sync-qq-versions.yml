name: Sync QQ Versions

on:
  schedule:
    # 每周一 03:17 UTC
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync version list
        run: python3 scripts/sync_qq_versions.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/qq_versions.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: weekly sync QQ version list"
            git push
          fi
